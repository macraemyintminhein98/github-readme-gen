<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">README Gen</h1>
        <p class="text-center text-gray-600 mb-8">Professional READMEs in seconds.</p>

        <form id="readmeForm" class="space-y-4">
            <div>
                <label for="repoName" class="block text-sm font-medium text-gray-700">Repository Name</label>
                <input type="text" id="repoName" name="repoName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea id="description" name="description" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-3 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md font-semibold hover:bg-blue-700 transition duration-200">Generate README (Coming Soon)</button>
        </form>

        <p class="mt-8 text-center text-gray-500 text-sm">This is a preview. Full functionality including payment and generation will be available soon!</p>
    </div>
</body>
</html>
