<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX | README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between">
    <header class="bg-gray-800 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gradient-to-r from-purple-400 to-pink-600">APEX / README-Gen</h1>
            <nav>
                <a href="#" class="text-gray-300 hover:text-white mx-2">Features</a>
                <a href="#" class="text-gray-300 hover:text-white mx-2">Pricing</a>
                <a href="#" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition-all duration-300">Get Started</a>
            </nav>
        </div>
    </header>
    <main class="flex-grow container mx-auto px-6 py-12 text-center">
        <h2 class="text-5xl font-extrabold leading-tight mb-6 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600 animate-pulse">
            Elevate Your GitHub READMEs
        </h2>
        <p class="text-xl text-gray-300 mb-10 max-w-3xl mx-auto">
            Instantly generate professional, customizable README.md files for your projects.
            Effortless. Elegant. Essential.
        </p>
        <a href="#" class="bg-purple-600 hover:bg-purple-700 text-white text-lg font-bold px-8 py-4 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300">Start Generating Now</a>
    </main>
    <footer class="bg-gray-800 p-6 text-center text-gray-400">
        <p>&copy; <span id="year"></span> APEX. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
