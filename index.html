<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>APEX - GitHub README Generator</title><link rel="stylesheet" href="/css/style.css"></head><body><div class="container"><h1>GitHub README Generator</h1><p>Craft professional READMEs effortlessly.</p><form id="readme-form"><input type="text" id="project-title" placeholder="Project Title" required><textarea id="description" placeholder="Description" required></textarea><textarea id="features" placeholder="Features (one per line)"></textarea><textarea id="installation" placeholder="Installation steps"></textarea><textarea id="usage" placeholder="Usage examples"></textarea><textarea id="contributing" placeholder="Contributing guidelines"></textarea><input type="text" id="license" placeholder="License (e.g., MIT)"><div class="button-group"><button type="submit">Generate & Pay</button></div></form><div id="output" style="display:none;"><textarea id="generated-readme" readonly></textarea><button onclick="copyToClipboard()">Copy to Clipboard</button></div></div><script src="/js/script.js"></script></body></html>
