<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl max-w-sm w-full text-center">
        <h1 class="text-4xl font-bold mb-4 text-purple-400">README Builder</h1>
        <p class="text-lg mb-6">Craft a perfect README.md in minutes.</p>
        <form action="/api/generate-readme" method="POST">
            <div class="mb-4">
                <input type="text" name="projectName" placeholder="Project Name" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>
            <div class="mb-4">
                <textarea name="description" placeholder="Description (brief overview)" rows="3" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
            </div>
            <p class="text-sm text-gray-400 mb-6">Unlock advanced sections like Features, Usage, and License with a one-time purchase!</p>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded transition duration-200">
                Generate Basic README - $9.99
            </button>
        </form>
        <p class="text-sm text-gray-500 mt-6">&#xA9; 2024 APEX</p>
    </div>
</body>
</html>
