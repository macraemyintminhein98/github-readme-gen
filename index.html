<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Genius</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 800px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="container bg-white p-8 rounded-lg shadow-lg text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">README Genius</h1>
        <p class="text-lg text-gray-600 mb-6">Craft the perfect GitHub README in minutes.</p>
        <form action="/generate" method="POST" class="space-y-4">
            <div>
                <label for="projectName" class="block text-left text-sm font-medium text-gray-700">Project Name</label>
                <input type="text" id="projectName" name="projectName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="My Awesome Project">
            </div>
            <div>
                <label for="description" class="block text-left text-sm font-medium text-gray-700">Description</label>
                <textarea id="description" name="description" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="A brief overview of your project..."></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Generate README - Buy for $9.99
            </button>
        </form>
        <p class="mt-6 text-sm text-gray-500">More options coming soon!</p>
    </div>
</body>
</html>
