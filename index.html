<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>APEX README Generator</title><style>body{font-family:sans-serif;margin:2em;background-color:#f0f2f5;color:#333}h1{color:#2c3e50}main{max-width:800px;margin:0 auto;padding:1.5em;background-color:#fff;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}input,textarea{width:calc(100% - 20px);padding:10px;margin-bottom:1em;border:1px solid #ddd;border-radius:4px}button{background-color:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer}button:hover{background-color:#0056b3}.output-section{margin-top:2em;border-top:1px solid #eee;padding-top:1.5em}.preview{white-space:pre-wrap;background-color:#f9f9f9;border:1px solid #ddd;padding:1em;border-radius:4px}</style></head><body><main><h1>APEX GitHub README Generator</h1><p>Craft professional GitHub READMEs instantly.</p><form id="readme-form"><label for="title">Project Title:</label><input type="text" id="title" placeholder="e.g., My Awesome Project"><label for="description">Description:</label><textarea id="description" rows="3" placeholder="A brief overview of your project..."></textarea><label for="installation">Installation:</label><textarea id="installation" rows="3" placeholder="How to install your project..."></textarea><label for="usage">Usage:</label><textarea id="usage" rows="3" placeholder="How to use your project..."></textarea><button type="submit">Generate README</button></form><div class="output-section"><h2>README Output</h2><div id="readme-preview" class="preview"></div><button id="copy-button" style="display:none;">Copy to Clipboard</button><p id="paywall-message">Unlock full features and download your README for $9.99</p><button id="checkout-button" style="display:none;">Purchase Now</button></div></main><script>document.getElementById('readme-form').addEventListener('submit', function(e){e.preventDefault();const title = document.getElementById('title').value;const desc = document.getElementById('description').value;const install = document.getElementById('installation').value;const usage = document.getElementById('usage').value;let readmeContent = `# ${title || 'Your Project Title'}\n\n${desc || 'A brief description of your project.'}\n\n## Installation\n${install || 'Clone the repository and run `npm install`'}\n\n## Usage\n${usage || 'Explain how to use your brilliant software.'}`;document.getElementById('readme-preview').innerText = readmeContent;document.getElementById('copy-button').style.display = 'block';document.getElementById('checkout-button').style.display = 'block';});document.getElementById('copy-button').addEventListener('click', function(){const readmeText = document.getElementById('readme-preview').innerText;navigator.clipboard.writeText(readmeText).then(() => {alert('Copied to clipboard!');}).catch(err => {console.error('Failed to copy: ', err);});});document.getElementById('checkout-button').addEventListener('click', function(){alert('Integrating with Stripe for $9.99 purchase!');});</script></body></html>
